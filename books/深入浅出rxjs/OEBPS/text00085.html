<h2 class="p2">6.3　本章小结</h2>
<p class="ziti">本章介绍了RxJS提供的一些辅助类操作符，包括数学类和条件布尔类，这些操作符在RxJS中并不处于核心地位，而且对于开发者来说又不难实现，但是有的场景中直接使用这些操作符可以避免重复发明轮子。</p>
