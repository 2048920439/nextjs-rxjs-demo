<h1 class="p1">第1章　函数响应式编程</h1>
<p class="ziti">RxJS使用了一种不同于传统的编程模式——函数响应式编程，所以，在我们开始学习RxJS之前，首先要了解这种编程模式。</p>
<p class="ziti">本章包含下列内容：</p>
<p class="ziti6">·通过一个例子感受RxJS的编程模式。</p>
<p class="ziti6">·什么是函数式编程。</p>
<p class="ziti6">·什么是响应式编程。</p>
<p class="ziti6">·什么是Reactive Extension。</p>
