<h2 class="p2">9.2　异常处理的难点</h2>
<p class="ziti">异常处理虽然必要，但是有一个很不好的影响，就是让代码更加复杂，因为需要考虑各种可能的情况，所以程序代码中就会出现各种分支。为了做到更好的异常处理，最好先让异常处理的方式不要太麻烦。</p>
