<h2 class="p2">10.4　支持多播的操作符</h2>
<p class="ziti">因为多播的需求十分广泛，实在没有理由让每一个需要应用多播的开发者重新发明一遍轮子，所以，RxJS中提供了支持多播的一系列操作符，这些操作符中最基础的是：</p>
<p class="ziti6">·multicast</p>
<p class="ziti6">·share</p>
<p class="ziti6">·publish</p>
<p class="ziti">其中，multicast又是基础中的基础，RxJS中其余所有支持多播的操作符都可以看作是基于multicast实现的增强功能，所以，我们从multicast开始介绍。</p>
