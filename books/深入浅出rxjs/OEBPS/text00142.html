<h1 class="p1">第10章　多播</h1>
<p class="ziti">本章介绍很常用的一种RxJS应用方法——多播（multicast），多播就是让一个数据流的内容被多个Observer订阅。</p>
<p class="ziti">为了实现多播，需要引入一种特殊的类型Subject，在RxJS中除了Subject这个类型，还有如下几个扩充的形态：</p>
<p class="ziti6">·BehaviorSubject</p>
<p class="ziti6">·ReplaySubject</p>
<p class="ziti6">·AsyncSubject</p>
