<h2 class="p2">4.2　创建同步数据流</h2>
<p class="ziti">同步数据流，或者说同步Observable对象，需要关心的就是：</p>
<p class="ziti6">·产生哪些数据。</p>
<p class="ziti6">·数据之间的先后顺序如何。</p>
<p class="ziti">对于同步数据流，数据之间的时间间隔不存在，所以不需要考虑时间方面的问题。</p>
