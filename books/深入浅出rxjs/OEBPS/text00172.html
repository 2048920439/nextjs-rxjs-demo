<h2 class="p2">11.5　本章小结</h2>
<p class="ziti">本章介绍了RxJS中控制数据推送和数据源订阅时机的功能，Scheduler就是支持这一功能的关键。为了理解Scheduler的工作原理，需要理解JavaScript对任务的调度方式，包括调用栈、事件循环以及Micro Tasks和Macro Tasks的区别。</p>
<p class="ziti">因为JavaScript是单线程语言，所以相对于其他语言的Rx实现，RxJS中的Scheduler并没有太多选择。在下一章中，会介绍利用Scheduler来简化单元测试的用法。</p>
