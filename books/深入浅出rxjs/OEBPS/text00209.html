<h2 class="p2">15.4　本章小结</h2>
<p class="ziti">本章介绍了游戏breakout的开发。通过开发breakout的例子，可以看到首先要明确一个应用的输入和输出，然后梳理清楚从输入到输出之间要进行的数据处理过程，剩下要做的就是使用RxJS来实现这个处理过程。</p>
<p class="ziti">游戏breakout的开发综合展示了RxJS的多个方面，可以看出，函数响应式编程对于交互类应用开发十分便利。</p>
