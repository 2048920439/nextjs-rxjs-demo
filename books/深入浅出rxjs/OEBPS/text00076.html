<h2 class="p2">6.1　数学类操作符</h2>
<p class="ziti">数学类操作符是体现数学计算功能的一类操作符，RxJS自带的数学类操作符只有四个，分别是：</p>
<p class="ziti6">·count</p>
<p class="ziti6">·max</p>
<p class="ziti6">·min</p>
<p class="ziti6">·reduce</p>
<p class="ziti">所有这些操作符都是实例操作符，还有一个共同特点，就是这些操作符必定会遍历上游Observable对象中吐出的所有数据才给下游传递数据，也就是说，它们只有在上游完结的时候，才给下游传递唯一数据。</p>
