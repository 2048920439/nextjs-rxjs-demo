<h2 class="p2">12.3　本章小结</h2>
<p class="ziti">本章介绍了利用RxJS开发中的调试和测试方法。坦白说，RxJS目前对调试的支持并不是很好，除了利用日志，开发者只能根据数据流依赖图和弹珠图来了解程序结构，让代码逻辑清晰，调试自然会比较顺畅。</p>
<p class="ziti">因为RxJS实践函数式编程方式，对单元测试的支持非常好，配合TestScheduler的使用，对于异步操作也很容易进行全方位单元测试。</p>
<p class="ziti">为了编写出可测性高的代码，对使用RxJS的数据管道要进行合理分割，让单元测试无需考虑外部资源的模拟。</p>
