<h2 class="p2">4.3　创建异步数据的Observable对象</h2>
<p class="ziti">异步数据流，或者说异步Observable对象，不光要考虑产生什么数据，还要考虑这些数据之间的时间间隔问题，RxJS提供的操作符就是要让开发者在日常尽量不要考虑时间因素。</p>
