<h2 class="p2">14.5　本章小结</h2>
<p class="ziti">Redux和RxJS都是管理数据的方式，利用RxJS可以轻松实现Redux的功能，但是因为Redux有更成熟的社区支持，更好的一个主意是将两者配合使用，Redux-Observable就是两者结合的产物。在Redux-Observable中，引入了一个新的概念叫epic，利用epic可以规范化应用中的异步处理逻辑，对于需要复杂异步操作的应用，Redux-Observable是一个好的选择。</p>
