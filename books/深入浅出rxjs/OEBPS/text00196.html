<h2 class="p2">13.4　本章小结</h2>
<p class="ziti">本章介绍了配合使用RxJS和React的方法。React和RxJS都属于响应式框架的范畴，不过React有自己的生命周期和状态管理方式，RxJS作为单纯的数据处理工具和React配合没有问题，但是如果要用RxJS来连接React组件，往往就要使用Subject来作为中转。</p>
<p class="ziti">如果要用RxJS来管理应用中的数据流，更好的方法是和Redux配合，这在下一章会详细介绍。</p>
