<h2 class="p2">13.3　利用RxJS管理React状态</h2>
<p class="ziti">在前面我们已经用很纯粹的React的方式创建了一个Counter应用，接下来，我们考虑如何利用RxJS来改进这个应用。RxJS只是一个数据流管理工具，并不具备任何用户界面渲染的功能，所以，一个很好的分工方式是这样：用RxJS来管理状态，用React来渲染界面。</p>
