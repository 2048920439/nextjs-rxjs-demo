<h1 class="p1">第2章　RxJS入门</h1>
<p class="ziti">在上一章，我们了解了函数响应式编程的思想，初步接触了RxJS，接下来，我们就要真刀真枪地学习如何用RxJS来编写代码了。</p>
<p class="ziti">RxJS的内容很多，在这一章中，我们主要介绍RxJS的重要概念，了解这些概念之后，才能进一步操纵RxJS这种工具，本章包含下列内容：</p>
<p class="ziti6">·RxJS的版本和运行环境。</p>
<p class="ziti6">·Observable的概念和使用方式。</p>
<p class="ziti6">·Hot Observable和Cold Observable的区别。</p>
