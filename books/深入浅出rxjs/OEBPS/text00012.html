<h2 class="p2">1.7　本章小结</h2>
<p class="ziti">本章首先通过一个简单的代码示例来展示RxJS编程方式和传统编程方式的区别，然后介绍了函数式和响应式两种编程方式，由此引入Reactive Extension的概念，Reactive Extension扩展了那些不支持响应式编程的语言的功能，让开发者可以更方便地以函数式和响应式风格来开发应用。</p>
<p class="ziti">RxJS就是用JavaScript语言实现的Reactive Extension，本书接下来会详细介绍RxJS的方方面面。</p>
