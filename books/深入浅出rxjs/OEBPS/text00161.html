<h1 class="p1">第11章　掌握时间的Scheduler</h1>
<p class="ziti">在这一章中，我们会介绍RxJS中的一个重要概念Scheduler，虽然Scheduler很不起眼，很多时候都感觉不到它的存在，但是巧妙使用Scheduler可以提高RxJS数据流处理的性能，获得更多的增强功能。</p>
<p class="ziti">Scheduler可以作为创造类和合并类操作符的函数使用，此外，RxJS还提供了observeOn和subscribeOn两个操作符，用于在数据管道任何位置插入给定Scheduler。</p>
