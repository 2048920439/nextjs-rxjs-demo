<h2 class="p2">3.2　操作符的分类</h2>
<p class="ziti">要想真正掌握操作符，就要将操作符放到某个问题场景中去理解其应用模式，有时候，一个问题可以用不同的操作符来解决，不同操作符各有什么优势，什么样的具体场景需要选择什么操作符，本书后面会详细介绍。</p>
<p class="ziti">RxJS v5版自带60多个操作符，掌握这些操作符最困难之处是当遇到一个实际问题的时候，该选择哪一个或者哪一些操作符来解决问题，所以，首先要对这些操作符分门别类，知道各类操作符的特点。</p>
<p class="ziti">根据不同的维度，操作符也有不同的分类方式，下面就分别介绍这些分类方式。</p>
