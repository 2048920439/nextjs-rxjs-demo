<h2 class="p2">11.3　Scheduler的工作原理</h2>
<p class="ziti">学习Scheduler有一个挑战，就是不能只看代码表面，而是要了解代码之后的运行原理。表面上使用Scheduler只是导入一些变量，然后把这些变量作为参数传递给操作符，但是要真正理解Scheduler是怎么回事，我们要搞清楚它们的工作原理。</p>
<p class="ziti">要理解不同Scheduler实例的不同功能，就不得不说一说JavaScript的代码运行方式。</p>
