<h2 class="p2">7.3　其他过滤方式</h2>
<p class="ziti">在过滤类的范畴内还有几个操作符很有趣，这几个操作符不一定实用，但是有它们之后过滤类操作符就是很完整了，这些操作符是：</p>
<p class="ziti6">·ignoreElement</p>
<p class="ziti6">·elementAt</p>
<p class="ziti6">·single</p>
