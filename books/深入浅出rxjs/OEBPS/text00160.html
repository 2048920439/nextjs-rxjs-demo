<h2 class="p2">10.6　本章小结</h2>
<p class="ziti">本章介绍了RxJS中对多播的处理方法。本质上多播就是根据一个Cold Observable对象产生一个Hot Observable对象，从而让这个Cold Observable对象不需要被重复订阅，但产生的数据却可以被多个观察者消费。为了达到这个目的，RxJS引入了Subject，可以说，多播就是围绕着Subject这个核心概念展开的。</p>
<p class="ziti">RxJS提供了多个支持多播的操作符，这些操作符全部都是基于multicast这个操作符的特例用法，在不同场景中，可以选择不同的多播策略。</p>
