<h1 class="p1">第15章　RxJS游戏开发</h1>
<p class="ziti">这一章以制作游戏的方式综合展示RxJS开发应用的技巧。游戏是交互性很强的应用，用户的输入、游戏中的时间都可以看作数据流，非常适合用RxJS来进行处理。我们将要实现的游戏叫做breakout，这个游戏复杂度适中，而且有很有趣的历史。</p>
